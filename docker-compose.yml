version: '3.8'

services:
  fish-app:
    build: .
    container_name: fish-mvp-app
    restart: unless-stopped
    ports:
      - "5000:5000"
    volumes:
      - ./data:/app/data
    environment:
      - FLASK_ENV=production
      - SECRET_KEY=${SECRET_KEY:-change-me-in-production}
      - DATABASE_PATH=/app/data/FISH.db
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/api/test')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
