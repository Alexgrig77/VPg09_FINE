{% extends "base.html" %}
{% block title %}Статистика — FISH-MVP{% endblock %}
{% block content %}
<h1>Статистика</h1>
<div class="stats-grid" id="stats">
    <div class="stat-card">
        <span class="stat-label">Всего выловов</span>
        <strong class="stat-value" id="totalCatches">0</strong>
    </div>
    <div class="stat-card">
        <span class="stat-label">Общая сумма</span>
        <strong class="stat-value" id="totalSum">0</strong>
    </div>
</div>
<div class="table-wrap">
<table id="byPerm">
    <thead>
        <tr>
            <th>Разрешение</th>
            <th>Кол-во</th>
            <th>Сумма</th>
        </tr>
    </thead>
    <tbody></tbody>
</table>
</div>
<div class="toolbar stats-toolbar">
    <button class="btn" id="btnExport" type="button">Экспорт CSV</button>
</div>
{% endblock %}
{% block scripts %}
<script>
document.getElementById('btnExport').onclick = ()=>{
    fetch('/api/export-catches', {credentials:'include'}).then(r=>r.blob()).then(blob=>{
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = 'catches.csv';
        a.click();
    });
};
fetch('/api/statistics').then(r=>r.json()).then(d=>{
    document.getElementById('totalCatches').textContent = d.total_catches || 0;
    document.getElementById('totalSum').textContent = (d.total_sum || 0).toFixed(2);
    const tbody = document.querySelector('#byPerm tbody');
    (d.by_permission || []).forEach(row=>{
        const tr = tbody.insertRow();
        tr.innerHTML = '<td>'+row.Разрешение+'</td><td>'+row.cnt+'</td><td>'+row.total+'</td>';
    });
});
</script>
{% endblock %}
