name: Docker Build

on:
  push:
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker build -t fish-mvp:test .
      - run: |
          mkdir -p data
          docker run -d --name fish-test -p 5000:5000 \
            -e SECRET_KEY=test -e DATABASE_PATH=/app/data/FISH.db \
            -v $(pwd)/data:/app/data fish-mvp:test
          sleep 15
          docker exec fish-test python scripts/init_db.py
          curl -f http://localhost:5000/api/test
          docker stop fish-test
          docker rm fish-test
